			<p class="surah-text">
			<span class="ayah"><span class="hizb-marker hizb-thumn" aria-label="ثمن الحزب">•</span>بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ لِإِيلَـٰفِ قُرَيْشٍ<span class="ayah-number" aria-hidden="true">1</span></span>
			<span class="ayah">إِ<ruby class="quranic-sign-above">ۦ<rt></rt></ruby>لَـٰفِهِمْ رِحْلَةَ ٱلشِّتَآءِ وَٱلصَّيْفِ<span class="ayah-number" aria-hidden="true">2</span></span>
			<span class="ayah">فَلْيَعْبُدُوا<ruby class="quranic-sign-above">۟<rt></rt></ruby> رَبَّ هَـٰذَا ٱلْبَيْتِ<span class="ayah-number" aria-hidden="true">3</span></span>
			<span class="ayah">ٱلَّذِىٓ أَطْعَمَهُم مِّن جُوعٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby> وَءَامَنَهُم مِّنْ خَوْفٍ<ruby class="quranic-sign-below">ۭ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">4</span></span>
