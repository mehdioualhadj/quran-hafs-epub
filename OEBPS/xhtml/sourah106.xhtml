		<h1>سورة قريش</h1>
		<p class="surah-meta">مكية عدد آياتها 4</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـ<span class="quranic-sign-above">ٰ</span>نِ ٱلرَّحِيمِ لِإِيلَـ<span class="quranic-sign-above">ٰ</span>فِ قُرَيْشٍ<span class="ayah-number">1</span></span>
			<span class="ayah">إِ<span class="quranic-sign-above">ۦ</span>لَـ<span class="quranic-sign-above">ٰ</span>فِهِمْ رِحْلَةَ ٱلشِّتَآءِ وَٱلصَّيْفِ<span class="ayah-number">2</span></span>
			<span class="ayah">فَلْيَعْبُدُوا<span class="quranic-sign-above">۟</span> رَبَّ هَـ<span class="quranic-sign-above">ٰ</span>ذَا ٱلْبَيْتِ<span class="ayah-number">3</span></span>
			<span class="ayah">ٱلَّذِىٓ أَطْعَمَهُم مِّن جُوعٍ<span class="quranic-sign-above">ۢ</span> وَءَامَنَهُم مِّنْ خَوْفٍ<span class="quranic-sign-below">ۭ</span><span class="ayah-number">4</span></span>
		</p>
