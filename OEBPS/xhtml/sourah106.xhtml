		<h1>سورة قريش</h1>
		<p class="surah-meta">مكية عدد آياتها 4</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ لِإِيلَـٰفِ قُرَيْشٍ<span class="ayah-number">1</span></span>
			<span class="ayah">إِۦلَـٰفِهِمْ رِحْلَةَ ٱلشِّتَآءِ وَٱلصَّيْفِ<span class="ayah-number">2</span></span>
			<span class="ayah">فَلْيَعْبُدُوا رَبَّ هَـٰذَا ٱلْبَيْتِ<span class="ayah-number">3</span></span>
			<span class="ayah">ٱلَّذِىٓ أَطْعَمَهُم مِّن جُوعٍۢ وَءَامَنَهُم مِّنْ خَوْفٍۭ<span class="ayah-number">4</span></span>
		</p>
