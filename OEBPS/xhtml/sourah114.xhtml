	<body>
		<h1>سورة الناس</h1>
		<p class="surah-meta">مكية عدد آياتها 6</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ<span class="ayah-number">1</span></span>
			<span class="ayah">مَلِكِ ٱلنَّاسِ<span class="ayah-number">2</span></span>
			<span class="ayah">إِلَـٰهِ ٱلنَّاسِ<span class="ayah-number">3</span></span>
			<span class="ayah">مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ<span class="ayah-number">4</span></span>
			<span class="ayah">ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ<span class="ayah-number">5</span></span>
			<span class="ayah">مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ<span class="ayah-number">6</span></span>
		</p>
