		<h1>سورة الكافرون</h1>
		<p class="surah-meta">مكية عدد آياتها 6</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـ<span class="quranic-sign-above">ٰ</span>نِ ٱلرَّحِيمِ قُلْ يَـ<span class="quranic-sign-above">ٰ</span>ٓأَيُّهَا ٱلْكَـ<span class="quranic-sign-above">ٰ</span>فِرُونَ<span class="ayah-number">1</span></span>
			<span class="ayah">لَآ أَعْبُدُ مَا تَعْبُدُونَ<span class="ayah-number">2</span></span>
			<span class="ayah">وَلَآ أَنتُمْ عَـ<span class="quranic-sign-above">ٰ</span>بِدُونَ مَآ أَعْبُدُ<span class="ayah-number">3</span></span>
			<span class="ayah">وَلَآ أَنَا۠ عَابِدٌ<span class="quranic-sign-below">ۭ</span> مَّا عَبَدتُّمْ<span class="ayah-number">4</span></span>
			<span class="ayah">وَلَآ أَنتُمْ عَـ<span class="quranic-sign-above">ٰ</span>بِدُونَ مَآ أَعْبُدُ<span class="ayah-number">5</span></span>
			<span class="ayah">لَكُمْ دِينُكُمْ وَلِىَ دِينِ<span class="ayah-number">6</span></span>
		</p>
