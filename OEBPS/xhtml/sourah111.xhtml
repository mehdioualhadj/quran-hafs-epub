		<h1 aria-label="سورة المسد">سورة المسد</h1>
		<p class="surah-meta">مكية عدد آياتها 5</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ تَبَّتْ يَدَآ أَبِى لَهَبٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby> وَتَبَّ<span class="ayah-number" aria-hidden="true">1</span></span>
			<span class="ayah">مَآ أَغْنَىٰ عَنْهُ مَالُهُ<ruby class="quranic-sign-above">ۥ<rt></rt></ruby> وَمَا كَسَبَ<span class="ayah-number" aria-hidden="true">2</span></span>
			<span class="ayah">سَيَصْلَىٰ نَارًا<ruby class="quranic-sign-below">ۭ<rt></rt></ruby> ذَاتَ لَهَبٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">3</span></span>
			<span class="ayah">وَٱمْرَأَتُهُ<ruby class="quranic-sign-above">ۥ<rt></rt></ruby> حَمَّالَةَ ٱلْحَطَبِ<span class="ayah-number" aria-hidden="true">4</span></span>
			<span class="ayah">فِى جِيدِهَا حَبْلٌ<ruby class="quranic-sign-below">ۭ<rt></rt></ruby> مِّن مَّسَدٍ<ruby class="quranic-sign-below">ۭ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">5</span></span>
		</p>
