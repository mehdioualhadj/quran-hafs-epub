	<body>
		<h1>سورة المسد</h1>
		<p class="surah-meta">مكية عدد آياتها 5</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ تَبَّتْ يَدَآ أَبِى لَهَبٍۢ وَتَبَّ<span class="ayah-number">1</span></span>
			<span class="ayah">مَآ أَغْنَىٰ عَنْهُ مَالُهُۥ وَمَا كَسَبَ<span class="ayah-number">2</span></span>
			<span class="ayah">سَيَصْلَىٰ نَارًۭا ذَاتَ لَهَبٍۢ<span class="ayah-number">3</span></span>
			<span class="ayah">وَٱمْرَأَتُهُۥ حَمَّالَةَ ٱلْحَطَبِ<span class="ayah-number">4</span></span>
			<span class="ayah">فِى جِيدِهَا حَبْلٌۭ مِّن مَّسَدٍۭ<span class="ayah-number">5</span></span>
		</p>
