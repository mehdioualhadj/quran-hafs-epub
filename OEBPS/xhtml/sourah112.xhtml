		<h1>سورة الإخلاص</h1>
		<p class="surah-meta">مكية عدد آياتها 4</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ قُلْ هُوَ ٱللَّهُ أَحَدٌ<span class="ayah-number">1</span></span>
			<span class="ayah">ٱللَّهُ ٱلصَّمَدُ<span class="ayah-number">2</span></span>
			<span class="ayah">لَمْ يَلِدْ وَلَمْ يُولَدْ<span class="ayah-number">3</span></span>
			<span class="ayah">وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ<span class="ayah-number">4</span></span>
		</p>
