		<h1 aria-label="سورة الفيل">سورة الفيل</h1>
		<p class="surah-meta">مكية عدد آياتها 5</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَـٰبِ ٱلْفِيلِ<span class="ayah-number" aria-hidden="true">1</span></span>
			<span class="ayah">أَلَمْ يَجْعَلْ كَيْدَهُمْ فِى تَضْلِيلٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">2</span></span>
			<span class="ayah">وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ<span class="ayah-number" aria-hidden="true">3</span></span>
			<span class="ayah">تَرْمِيهِم بِحِجَارَةٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby> مِّن سِجِّيلٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">4</span></span>
			<span class="ayah">فَجَعَلَهُمْ كَعَصْفٍ<ruby class="quranic-sign-above">ۢ<rt></rt></ruby> مَّأْكُولٍ<ruby class="quranic-sign-below">ۭ<rt></rt></ruby><span class="ayah-number" aria-hidden="true">5</span></span>
		</p>
