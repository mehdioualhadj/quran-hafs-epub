	<body>
		<h1>سورة الفيل</h1>
		<p class="surah-meta">مكية عدد آياتها 5</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَـٰبِ ٱلْفِيلِ<span class="ayah-number">1</span></span>
			<span class="ayah">أَلَمْ يَجْعَلْ كَيْدَهُمْ فِى تَضْلِيلٍۢ<span class="ayah-number">2</span></span>
			<span class="ayah">وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ<span class="ayah-number">3</span></span>
			<span class="ayah">تَرْمِيهِم بِحِجَارَةٍۢ مِّن سِجِّيلٍۢ<span class="ayah-number">4</span></span>
			<span class="ayah">فَجَعَلَهُمْ كَعَصْفٍۢ مَّأْكُولٍۭ<span class="ayah-number">5</span></span>
		</p>
