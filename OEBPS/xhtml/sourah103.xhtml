		<h1>سورة العصر</h1>
		<p class="surah-meta">مكية عدد آياتها 3</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ وَٱلْعَصْرِ<span class="ayah-number">1</span></span>
			<span class="ayah">إِنَّ ٱلْإِنسَـٰنَ لَفِى خُسْرٍ<span class="ayah-number">2</span></span>
			<span class="ayah">إِلَّا ٱلَّذِينَ ءَامَنُوا وَعَمِلُوا ٱلصَّـٰلِحَـٰتِ وَتَوَاصَوْا بِٱلْحَقِّ وَتَوَاصَوْا بِٱلصَّبْرِ<span class="ayah-number">3</span></span>
		</p>
