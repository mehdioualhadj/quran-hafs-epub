		<h1>سورة النصر</h1>
		<p class="surah-meta">مدنية عدد آياتها 3</p>
		<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـ<span class="quranic-sign-above">ٰ</span>نِ ٱلرَّحِيمِ إِذَا جَآءَ نَصْرُ ٱللَّهِ وَٱلْفَتْحُ<span class="ayah-number">1</span></span>
			<span class="ayah">وَرَأَيْتَ ٱلنَّاسَ يَدْخُلُونَ فِى دِينِ ٱللَّهِ أَفْوَاجً<span class="quranic-sign-below">ۭ</span>ا<span class="ayah-number">2</span></span>
			<span class="ayah">فَسَبِّحْ بِحَمْدِ رَبِّكَ وَٱسْتَغْفِرْهُ <span class="quranic-sign-waqf">ۚ</span> إِنَّهُ<span class="quranic-sign-above">ۥ</span> كَانَ تَوَّابً<span class="quranic-sign-above">ۢ</span>ا<span class="ayah-number">3</span></span>
		</p>
