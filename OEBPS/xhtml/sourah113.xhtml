			<h1 aria-label="سورة الفلق">سورة الفلق</h1>
			<p class="surah-meta">مكية عدد آياتها 5</p>
			<p class="surah-text">
			<span class="ayah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ<span class="ayah-number" aria-hidden="true">1</span></span>
			<span class="ayah">مِن شَرِّ مَا خَلَقَ<span class="ayah-number" aria-hidden="true">2</span></span>
			<span class="ayah">وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ<span class="ayah-number" aria-hidden="true">3</span></span>
			<span class="ayah">وَمِن شَرِّ ٱلنَّفَّـٰثَـٰتِ فِى ٱلْعُقَدِ<span class="ayah-number" aria-hidden="true">4</span></span>
			<span class="ayah">وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ<span class="ayah-number" aria-hidden="true">5</span></span>
		</p>
