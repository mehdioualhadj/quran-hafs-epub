	<head>
		<meta charset="UTF-8"/>
		<title>إهداء</title>
		<link rel="stylesheet" type="text/css" href="../css/style.css"/>
	</head>
	<body epub:type="frontmatter dedication">
		<div class="dedication-page">
			<p class="dedication-basmala">بسم الله الرحمن الرحيم</p>
			<p class="dedication-text">
				هذا العمل المتواضع صدقةٌ جاريةٌ<br/>
				عن آبائي وأمهاتي الأحياء منهم والأموات<br/>
				وعن زوجتي وذريتي وأهلي<br/>
				وعن كلِّ من أحبَّ كتاب الله وتعلَّق قلبه بتلاوته<br/>
				من السلف الصالح إلى يوم الدين
			</p>
			<p class="dedication-duaa">
				اللهم تقبَّله خالصاً لوجهك الكريم<br/>
				وانفع به كل من تلاه وحفظه
			</p>
			<p class="dedication-ameen">اللهم آمين يا رب العالمين</p>
		</div>
	</body>
</html>
